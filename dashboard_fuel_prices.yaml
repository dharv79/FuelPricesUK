# Fuel Prices UK — Lovelace Dashboard
#
# How to use:
#   1. In Home Assistant go to Settings → Dashboards → Add Dashboard
#   2. Create a new dashboard, open it, click the ⋮ menu → Edit → Raw configuration editor
#   3. Paste this entire file and save
#
# Requirements: no HACS custom cards needed — uses only built-in HA cards
#
# The entity IDs below assume a single integration instance. If you have multiple
# locations configured, append _2, _3 etc. to the entity IDs for the second/third instance.

title: Fuel Prices UK
views:
  - title: Fuel Prices
    path: fuel-prices
    icon: mdi:gas-station
    cards:

      # ── Cheapest E10 Petrol ──────────────────────────────────────────────────
      - type: markdown
        title: Cheapest E10 Petrol — sorted by price
        content: |
          {%- set ns = namespace(rows=[]) -%}
          {%- for i in range(1, 51) -%}
            {%- set eid = 'sensor.fuel_prices_uk_station_' ~ i -%}
            {%- if state_attr(eid, 'e10_price') is not none -%}
              {%- set ns.rows = ns.rows + [{'name': state_attr(eid, 'station_name'), 'brand': state_attr(eid, 'brand'), 'e10': state_attr(eid, 'e10_price'), 'dist': state_attr(eid, 'distance_miles'), 'updated': state_attr(eid, 'last_updated')}] -%}
            {%- endif -%}
          {%- endfor %}
          | # | Station | **£/L** | Distance | Updated |
          | --- | --- | --- | --- | --- |
          {% for s in ns.rows | sort(attribute='e10') -%}
          | {{ loop.index }} | {{ s.name }} ({{ s.brand }}) | **{{ s.e10 }}** | {{ s.dist }} mi | {{ (s.updated[:10].split('-') | reverse | join('/')) ~ ' ' ~ s.updated[11:19] if s.updated else '—' }} |
          {% endfor %}

