# Fuel Prices UK — Daily Slack Notification
#
# How to install:
#   1. Go to Settings → Automations → + Create Automation
#   2. Click the three-dot menu → Edit in YAML
#   3. Replace all content with everything below and save
#
# Note: update the action name if your Slack integration is named differently.
# Check Settings → Devices & Services → Slack to confirm the service name.

alias: "Fuel Prices — Daily Slack"
description: "Post cheapest fuel prices to Slack at 8am"
trigger:
  - platform: time
    at: "08:00:00"
action:
  - action: notify.slack
    data:
      target: "#harvhome"
      message: >
        {%- set ns = namespace(e10=[], b7=[], e5=[], sdv=[]) -%}
        {%- for i in range(1, 51) -%}
          {%- set eid = 'sensor.fuel_prices_uk_station_' ~ i -%}
          {%- if state_attr(eid, 'station_name') is not none -%}
            {%- set name = state_attr(eid, 'station_name') ~ ' (' ~ state_attr(eid, 'brand') ~ ')' -%}
            {%- set dist = state_attr(eid, 'distance_miles') -%}
            {%- set upd  = state_attr(eid, 'last_updated') -%}
            {%- set updf = (upd[:10].split('-') | reverse | join('/')) ~ ' ' ~ upd[11:19] if upd else '—' -%}
            {%- set row  = {'name': name, 'dist': dist, 'upd': updf,
                            'e10': state_attr(eid, 'e10_price'),
                            'e5':  state_attr(eid, 'e5_price'),
                            'b7':  state_attr(eid, 'b7_price'),
                            'sdv': state_attr(eid, 'sdv_price')} -%}
            {%- if row.e10 is not none -%}{%- set ns.e10 = ns.e10 + [row] -%}{%- endif -%}
            {%- if row.b7  is not none -%}{%- set ns.b7  = ns.b7  + [row] -%}{%- endif -%}
            {%- if row.e5  is not none -%}{%- set ns.e5  = ns.e5  + [row] -%}{%- endif -%}
            {%- if row.sdv is not none -%}{%- set ns.sdv = ns.sdv + [row] -%}{%- endif -%}
          {%- endif -%}
        {%- endfor -%}
        *⛽ Fuel Prices — {{ now().strftime('%d/%m/%Y') }}*

        *Cheapest E10 Petrol*
        {%- for s in ns.e10 | sort(attribute='e10') %}
        {{ loop.index }}. {{ s.name }} — *£{{ s.e10 }}/L* | {{ s.dist }} mi | {{ s.upd }}
        {%- endfor %}

        *🛢 Cheapest B7 Diesel*
        {%- for s in ns.b7 | sort(attribute='b7') %}
        {{ loop.index }}. {{ s.name }} — *£{{ s.b7 }}/L* | {{ s.dist }} mi | {{ s.upd }}
        {%- endfor %}
        {%- if ns.e5 | length > 0 %}

        *Cheapest E5 Super Unleaded*
        {%- for s in ns.e5 | sort(attribute='e5') %}
        {{ loop.index }}. {{ s.name }} — *£{{ s.e5 }}/L* | {{ s.dist }} mi | {{ s.upd }}
        {%- endfor %}
        {%- endif %}
        {%- if ns.sdv | length > 0 %}

        *🛢 Cheapest SDV Super Diesel*
        {%- for s in ns.sdv | sort(attribute='sdv') %}
        {{ loop.index }}. {{ s.name }} — *£{{ s.sdv }}/L* | {{ s.dist }} mi | {{ s.upd }}
        {%- endfor %}
        {%- endif %}
